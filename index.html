<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BDM Workshop Tool</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f5f7;color:#1d1d1f;min-height:100vh}
textarea,input,button{font-family:inherit}
textarea{outline:none;resize:vertical}
input{outline:none}
.screen{display:none;padding:1.5rem;max-width:520px;margin:0 auto}
.screen.active{display:block}
.screen-wide{display:none;padding:1.5rem;max-width:680px;margin:0 auto}
.screen-wide.active{display:block}
.screen-full{display:none;min-height:100vh;background:#0f1117;color:#fff;flex-direction:column}
.screen-full.active{display:flex}
.card{background:#fff;border:0.5px solid #e5e5ea;border-radius:12px;padding:1rem 1.25rem;margin-bottom:12px}
.badge{display:inline-block;font-size:11px;padding:3px 8px;border-radius:6px;font-weight:500}
.btn{display:block;width:100%;padding:14px;border-radius:10px;border:none;font-size:15px;font-weight:500;cursor:pointer;margin-bottom:10px;transition:opacity .2s}
.btn-primary{background:#5B8AF5;color:#fff}
.btn-secondary{background:transparent;border:0.5px solid #d2d2d7;color:#1d1d1f}
.btn-disabled{background:#ebebed;color:#aeaeb2;cursor:default}
.btn-green{background:#2EAE85;color:#fff}
.btn-sm{width:auto;padding:8px 16px;font-size:13px;margin-bottom:0}
.progress-bar{display:flex;gap:5px;margin-bottom:10px}
.progress-seg{flex:1;height:4px;border-radius:4px}
.tile-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.5rem}
.participant-tile{background:#fff;border:0.5px solid #d2d2d7;border-radius:12px;padding:1rem;cursor:pointer}
.avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;flex-shrink:0}
.tabs{display:flex;gap:6px;margin-bottom:1.25rem;flex-wrap:wrap}
.tab{padding:6px 10px;border-radius:8px;border:0.5px solid #d2d2d7;background:transparent;color:#6e6e73;font-size:11px;cursor:pointer}
.tab.active{background:#5B8AF5;border-color:#5B8AF5;color:#fff}
input[type=text]{width:100%;border-radius:8px;border:0.5px solid #d2d2d7;background:#fff;color:#1d1d1f;padding:10px 12px;font-size:14px}
textarea{width:100%;border-radius:8px;border:0.5px solid #d2d2d7;background:#fff;color:#1d1d1f;padding:10px 12px;font-size:14px;min-height:60px}
.field-label{font-size:13px;font-weight:500;color:#1d1d1f;margin-bottom:2px}
.field-hint{font-size:12px;color:#6e6e73;margin-bottom:6px}
.field-wrap{margin-bottom:16px}
.star-row{display:flex;gap:6px}
.star-btn{flex:1;height:36px;border-radius:8px;border:0.5px solid #d2d2d7;background:transparent;color:#6e6e73;font-size:13px;cursor:pointer}
.bar-wrap{height:8px;background:#ebebed;border-radius:4px;margin-top:4px}
.bar-fill{height:100%;border-radius:4px;transition:width .4s}
.dim-row{display:flex;align-items:center;gap:8px;background:#fff;border:0.5px solid #e5e5ea;border-radius:10px;padding:10px 12px;margin-bottom:6px}
.suggestion-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.suggestion-chip{padding:6px 12px;border-radius:20px;border:0.5px solid #d2d2d7;background:transparent;color:#6e6e73;font-size:12px;cursor:pointer}
.pres-nav{background:#1a1d27;padding:1rem 2rem;display:flex;align-items:center;gap:16px}
.pres-slide{flex:1;display:flex;flex-direction:column;justify-content:center;padding:2.5rem 3.5rem;min-height:460px}
.pres-dot{height:8px;border-radius:4px;background:#333;cursor:pointer;transition:all .2s}
.pin-display{display:flex;gap:10px;justify-content:center;margin-bottom:1rem}
.pin-box{width:44px;height:52px;border-radius:10px;border:0.5px solid #d2d2d7;background:#fff;display:flex;align-items:center;justify-content:center;font-size:20px}
.pin-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.pin-btn{height:52px;border-radius:10px;border:0.5px solid #d2d2d7;background:#fff;color:#1d1d1f;font-size:18px;cursor:pointer}
.sync-ok{font-size:11px;color:#2EAE85;margin-top:6px}
.sync-err{font-size:11px;color:#E24B4A;margin-top:6px}
.sync-wait{font-size:11px;color:#E8A23A;margin-top:6px}
pre{background:#fff;border:0.5px solid #e5e5ea;border-radius:10px;padding:1rem;font-size:12px;color:#6e6e73;white-space:pre-wrap;line-height:1.7}
.back-btn{background:none;border:none;cursor:pointer;color:#6e6e73;font-size:18px;padding:0;margin-right:10px}
/* Fieberkurve */
.fever-section{background:#fff;border:0.5px solid #e5e5ea;border-radius:12px;padding:1rem 1.25rem;margin-bottom:12px}
.fever-month-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:0.5px solid #f0f0f0}
.fever-month-row:last-child{border-bottom:none}
.fever-score-btns{display:flex;gap:4px}
.fever-score-btn{width:32px;height:32px;border-radius:8px;border:0.5px solid #d2d2d7;background:transparent;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s}
.fever-comment{flex:1;min-width:0}
@media(max-width:480px){.pres-slide{padding:1.5rem}}
</style>
</head>
<body>

<div id="s-home" class="screen active">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:1.5rem">
    <div style="flex:1">
      <h2 style="font-weight:500;font-size:20px;color:#1d1d1f">BDM Workshop</h2>
      <p style="font-size:13px;color:#6e6e73;margin:0">Tag 1 – 02.07.</p>
    </div>
  </div>

  <!-- Workshop Phase Block -->
  <div class="card">
    <div style="font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:#aeaeb2;margin-bottom:6px">Aktive Phase</div>
    <div id="home-phase-label" style="font-size:16px;font-weight:500;color:#1d1d1f;margin-bottom:2px"></div>
    <div id="home-phase-desc" style="font-size:13px;color:#6e6e73;margin-bottom:12px"></div>
    <div class="progress-bar" id="home-progress"></div>
    <div id="home-sub-count" style="font-size:12px;color:#6e6e73"></div>
    <div id="home-sync" class="sync-ok"></div>
  </div>
  <div id="home-tiles" class="tile-grid"></div>
  <div id="home-note-blocks"></div>
  <div id="home-waiting" style="display:none" class="card">
    <div style="font-size:14px;color:#6e6e73" id="home-waiting-text"></div>
  </div>
  <button class="btn btn-primary" onclick="goModAuth()">Moderator-Ansicht →</button>
  <button class="btn btn-secondary" onclick="startPres()">Präsentation starten</button>

  <!-- Fieberkurve Block -->
  <div style="margin-top:1.5rem">
    <div style="font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:#aeaeb2;margin-bottom:10px">Team-Fieberkurve</div>
    <div class="fever-section">
      <p style="font-size:13px;color:#6e6e73;margin-bottom:1rem">Wie hat sich die Zusammenarbeit entwickelt? Bewerte jeden Monat und hinterlasse einen Kommentar.</p>
      <div style="display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap">
        <div style="flex:1;min-width:140px">
          <div style="font-size:12px;color:#6e6e73;margin-bottom:4px">Dein Name</div>
          <select id="fever-person-select" onchange="renderFeverInput()" style="width:100%;border-radius:8px;border:0.5px solid #d2d2d7;background:#fff;color:#1d1d1f;padding:8px 10px;font-size:14px">
            <option value="">– auswählen –</option>
            <option value="arjan">Arjan</option>
            <option value="sabine">Sabine</option>
            <option value="joerg">Jörg</option>
            <option value="ralf">Ralf</option>
          </select>
        </div>
      </div>
      <div id="fever-input-area"></div>
    </div>
  </div>
</div>

<div id="s-participant" class="screen">
  <div style="display:flex;align-items:center;margin-bottom:1.25rem">
    <button class="back-btn" onclick="goHome()">←</button>
    <div id="p-avatar" class="avatar" style="margin-right:10px"></div>
    <div>
      <div id="p-name" style="font-weight:500;font-size:14px;color:#1d1d1f"></div>
      <div class="sync-ok">● Live gespeichert</div>
    </div>
  </div>
  <div id="p-tabs" class="tabs"></div>
  <div id="p-content"></div>
</div>

<div id="s-notes" class="screen">
  <div style="display:flex;align-items:center;margin-bottom:1.25rem">
    <button class="back-btn" onclick="goHome()">←</button>
    <span id="notes-icon" style="font-size:20px;margin-right:10px"></span>
    <div>
      <div id="notes-label" style="font-weight:500;font-size:14px;color:#1d1d1f"></div>
      <div id="notes-meta" style="font-size:12px;color:#6e6e73"></div>
    </div>
  </div>
  <div id="notes-content"></div>
</div>

<div id="s-modauth" class="screen" style="max-width:340px;text-align:center;padding-top:3rem">
  <div style="width:48px;height:48px;border-radius:50%;background:#5B8AF522;display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;font-size:20px">🔒</div>
  <h2 style="font-size:18px;margin-bottom:4px">Moderator-Zugang</h2>
  <p style="font-size:13px;color:#6e6e73;margin-bottom:1.5rem">PIN eingeben</p>
  <div class="pin-display" id="pin-display"></div>
  <div id="pin-error" style="font-size:12px;color:#E24B4A;margin-bottom:10px;min-height:16px"></div>
  <div class="pin-grid" id="pin-grid"></div>
  <button onclick="goHome()" style="background:none;border:none;color:#6e6e73;font-size:13px;cursor:pointer">← Zurück</button>
</div>

<div id="s-moderator" class="screen-wide">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:1.25rem">
    <button class="back-btn" onclick="goHome()">←</button>
    <div style="flex:1">
      <div style="font-weight:500;font-size:16px;color:#1d1d1f">Moderator · BDM Workshop</div>
      <div class="sync-ok">● Firebase Live</div>
    </div>
    <button class="btn btn-primary btn-sm" onclick="startPres()">Präsentation →</button>
  </div>
  <div class="card">
    <div style="font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:#aeaeb2;margin-bottom:8px">Phasensteuerung</div>
    <div id="mod-phases" style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap"></div>
    <div id="mod-phase-btn-wrap"></div>
  </div>
  <div class="tabs" id="mod-tabs"></div>
  <div id="mod-content"></div>
</div>

<div id="s-pres" class="screen-full">
  <div class="pres-slide" id="pres-slide"></div>
  <div class="pres-nav">
    <button onclick="setPresMode(false)" style="background:none;border:0.5px solid #333;color:#888;font-size:12px;padding:6px 12px;border-radius:6px;cursor:pointer">✕ ESC</button>
    <div style="flex:1;display:flex;gap:4px;justify-content:center;flex-wrap:wrap" id="pres-dots"></div>
    <div style="display:flex;gap:8px;align-items:center">
      <button id="pres-prev" onclick="presNav(-1)" style="padding:8px 16px;border-radius:8px;border:0.5px solid #333;background:transparent;color:#fff;font-size:14px;cursor:pointer">←</button>
      <span id="pres-counter" style="font-size:12px;color:#555"></span>
      <button id="pres-next" onclick="presNav(1)" style="padding:8px 16px;border-radius:8px;border:0.5px solid #333;background:transparent;color:#fff;font-size:14px;cursor:pointer">→</button>
    </div>
  </div>
</div>

<script>
// ─── FIREBASE ─────────────────────────────────────────────────────────────────
firebase.initializeApp({
  apiKey:"AIzaSyBzrCIAFQuuI_6iBn640CTUb2HE5OQNP24",
  authDomain:"doctari-workshop.firebaseapp.com",
  databaseURL:"https://doctari-workshop-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"doctari-workshop",
  storageBucket:"doctari-workshop.firebasestorage.app",
  messagingSenderId:"894998686604",
  appId:"1:894998686604:web:5e124e538228fa947c44a9"
});
const db = firebase.database();
const PFX = "workshops/bdm";
const MOD_PIN = "2611";

// ─── WORKSHOP CONFIG ──────────────────────────────────────────────────────────
const WS = {
  participants:[
    {id:"arjan",name:"Arjan",role:"CSO / Moderation",color:"#B06AE0"},
    {id:"sabine",name:"Sabine",role:"BDM",color:"#5B8AF5"},
    {id:"joerg",name:"Jörg",role:"BDM",color:"#2EAE85"},
    {id:"ralf",name:"Ralf",role:"BDM",color:"#E8A23A"},
  ],
  compassFields:[
    {field:"motiviert",label:"Was motiviert mich?",hint:"Was treibt dich an – im Job, in diesem Team?"},
    {field:"zieleSelbst",label:"Meine persönlichen Ziele",hint:"Was willst du für dich selbst erreichen?"},
    {field:"zieleDoctari",label:"Meine Ziele für doctari",hint:"Was willst du für das Unternehmen erreichen?"},
    {field:"wieErreichen",label:"Mein Weg dahin",hint:"Wie gehst du vor? Was sind deine Mittel?"},
    {field:"teamBrauche",label:"Was ich vom Team brauche",hint:"Was brauchst du von den anderen?"},
    {field:"wasBremst",label:"Was mich bremst",hint:"Was hält dich zurück?"},
  ],
  checkinFields:[
    {field:"erwartung",label:"Meine Erwartung an heute",hint:"Was soll am Ende des Tages erreicht sein?"},
    {field:"energie",label:"Mein Energielevel",hint:"Wie komme ich an – was nehme ich mit?"},
    {field:"nogos",label:"Meine No-Gos für heute",hint:"Was soll heute NICHT passieren?"},
  ],
  noteBlocks:[
    {id:"markt",label:"Markt & Rechtslage",icon:"⚖️",moderator:"Sabine",time:"12:45–13:30"},
    {id:"pricing",label:"Pricing & Guardrails",icon:"💰",moderator:"Jörg & Ralf",time:"15:15–16:15"},
    {id:"mvps",label:"Angebotsarchitektur MV/PS",icon:"📋",moderator:"Tobias Eisele",time:"16:15–17:00"},
    {id:"review",label:"Tages-Review & Team-Deals",icon:"🎯",moderator:"Zusammen",time:"17:00–17:30"},
  ],
  phases:[
    {id:"checkin",label:"Check-in",desc:"Erwartungen & Energielevel"},
    {id:"compass",label:"Mein Kompass",desc:"Individuelle Eingaben"},
    {id:"dimensions",label:"Zusammenarbeit",desc:"Wie arbeiten wir zusammen?"},
    {id:"rating",label:"Einschätzung",desc:"Ehrliche Bewertung 1–5"},
    {id:"notizen",label:"Notizen",desc:"Live-Mitschrift der Sessions"},
    {id:"done",label:"Abgeschlossen",desc:""},
  ],
};

// Last 12 months
function getLast12Months(){
  const months=[];
  const now=new Date();
  for(let i=11;i>=0;i--){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    const key=d.getFullYear()+"-"+(d.getMonth()+1).toString().padStart(2,"0");
    const label=d.toLocaleDateString("de-DE",{month:"short",year:"numeric"});
    months.push({key,label});
  }
  return months;
}
const MONTHS = getLast12Months();

// ─── STATE ────────────────────────────────────────────────────────────────────
let state={
  phase: WS.phases[0].id,
  dimensions:[],
  notes:{},
  participants: Object.fromEntries(WS.participants.map(p=>[p.id,{
    checkin:Object.fromEntries(WS.checkinFields.map(f=>[f.field,""])),
    compass:Object.fromEntries(WS.compassFields.map(f=>[f.field,""])),
    ratings:{},
    submittedCheckin:false,submittedCompass:false,submittedRating:false
  }])),
  fever: {} // {monthKey: {pid: {score, comment}}}
};
let currentScreen="s-home";
let modTab="overview";
let presSlide=0,presSlides=[];
let pinInput="",pinAttempts=0;
let summaries={};
const debounceTimers={};

// ─── FIREBASE ─────────────────────────────────────────────────────────────────
function fbSet(path,val){return db.ref(PFX+"/"+path).set(val);}
function fbSetParticipant(pid,data){
  state.participants[pid]=data;
  clearTimeout(debounceTimers[pid]);
  debounceTimers[pid]=setTimeout(()=>fbSet("participant_"+pid,data),800);
}
function fbSetFever(monthKey,pid,score,comment){
  if(!state.fever[monthKey])state.fever[monthKey]={};
  state.fever[monthKey][pid]={score,comment};
  clearTimeout(debounceTimers["fever_"+monthKey+"_"+pid]);
  debounceTimers["fever_"+monthKey+"_"+pid]=setTimeout(()=>{
    fbSet("fever/"+monthKey+"/"+pid,{score,comment});
  },800);
}

// Live listener
db.ref(PFX).on("value",snap=>{
  const v=snap.val()||{};
  state.phase=v.phase||WS.phases[0].id;
  state.dimensions=v.dimensions||[];
  state.notes=v.notes||{};
  state.fever=v.fever||{};
  WS.participants.forEach(pt=>{
    if(!debounceTimers[pt.id]){
      state.participants[pt.id]=v["participant_"+pt.id]||state.participants[pt.id];
    }
  });
  setSync("ok");
  if(currentScreen!=="s-participant"&&currentScreen!=="s-notes"){
    refreshCurrentScreen();
  }
},()=>setSync("err"));

function resetAll(){
  const fresh={
    phase:WS.phases[0].id,dimensions:[],notes:{},fever:{},
    ...Object.fromEntries(WS.participants.map(p=>["participant_"+p.id,{
      checkin:Object.fromEntries(WS.checkinFields.map(f=>[f.field,""])),
      compass:Object.fromEntries(WS.compassFields.map(f=>[f.field,""])),
      ratings:{},submittedCheckin:false,submittedCompass:false,submittedRating:false
    }]))
  };
  db.ref(PFX).set(fresh);
  summaries={};
}

// ─── SYNC ─────────────────────────────────────────────────────────────────────
function setSync(s){
  const el=document.getElementById("home-sync");
  if(!el)return;
  if(s==="ok"){el.className="sync-ok";el.textContent="● Firebase Live";}
  else if(s==="err"){el.className="sync-err";el.textContent="● Verbindungsfehler";}
  else{el.className="sync-wait";el.textContent="● Verbinde...";}
}
setSync("wait");

// ─── ROUTING ──────────────────────────────────────────────────────────────────
function show(id){
  document.querySelectorAll(".screen,.screen-wide,.screen-full").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  currentScreen=id;
}
function goHome(){show("s-home");renderHome();}
function goModAuth(){show("s-modauth");renderPinPad();}
function showMod(){show("s-moderator");renderMod();}
function startPres(){buildPresSlides();show("s-pres");renderPresSlide();}
function setPresMode(on){if(on)startPres();else goHome();}
function refreshCurrentScreen(){
  if(currentScreen==="s-home")renderHome();
  else if(currentScreen==="s-moderator")renderMod();
  else if(currentScreen==="s-participant")renderParticipant();
}

// ─── HOME ─────────────────────────────────────────────────────────────────────
function renderHome(){
  const phaseIdx=WS.phases.findIndex(p=>p.id===state.phase);
  const phaseObj=WS.phases[phaseIdx]||WS.phases[0];
  document.getElementById("home-phase-label").textContent=phaseObj.label;
  document.getElementById("home-phase-desc").textContent=phaseObj.desc;
  const prog=document.getElementById("home-progress");
  const nodone=WS.phases.filter(p=>p.id!=="done");
  prog.innerHTML=nodone.map((p,i)=>`<div class="progress-seg" style="background:${phaseIdx>i?"#2EAE85":phaseIdx===i?"#5B8AF5":"#ebebed"}"></div>`).join("");
  const subKey=state.phase==="checkin"?"submittedCheckin":state.phase==="compass"?"submittedCompass":state.phase==="rating"?"submittedRating":null;
  const sc=document.getElementById("home-sub-count");
  if(subKey){const cnt=WS.participants.filter(p=>state.participants[p.id]?.[subKey]).length;sc.textContent=cnt+"/"+WS.participants.length+" eingereicht"+(cnt===WS.participants.length?" ✓":"");}
  else sc.textContent="";
  const inputPhases=["checkin","compass","rating"];
  const tiles=document.getElementById("home-tiles");
  if(inputPhases.includes(state.phase)){
    tiles.style.display="grid";
    tiles.innerHTML=WS.participants.map(p=>{
      const d=state.participants[p.id]||{};
      const sub=subKey?d[subKey]:false;
      const complete=state.phase==="checkin"?isCheckinComplete(d):state.phase==="compass"?isCompassComplete(d):isRatingComplete(d);
      return`<div class="participant-tile" style="border-color:${sub?p.color+"66":"#d2d2d7"}" onclick="goParticipant('${p.id}')">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
          <div class="avatar" style="background:${p.color}22;color:${p.color}">${p.name[0]}</div>
          <div><div style="font-weight:500;font-size:14px">${p.name}</div><div style="font-size:11px;color:#6e6e73">${p.role}</div></div>
        </div>
        <span class="badge" style="background:${sub?"#2EAE8520":complete?"#E8A23A20":"#ebebed"};color:${sub?"#2EAE85":complete?"#E8A23A":"#aeaeb2"}">${sub?"✓ Eingereicht":complete?"Bereit":"Offen"}</span>
      </div>`;
    }).join("");
  } else tiles.style.display="none";
  const nb=document.getElementById("home-note-blocks");
  if(state.phase==="notizen"){
    nb.innerHTML=WS.noteBlocks.map(b=>`<div class="card" style="cursor:pointer;display:flex;align-items:center;gap:12px" onclick="goNotes('${b.id}')">
      <span style="font-size:20px">${b.icon}</span>
      <div style="flex:1"><div style="font-weight:500;font-size:14px">${b.label}</div><div style="font-size:12px;color:#6e6e73">${b.time} · ${b.moderator}</div></div>
      <span style="color:#aeaeb2">›</span>
    </div>`).join("");
  } else nb.innerHTML="";
  const w=document.getElementById("home-waiting");
  if(state.phase==="dimensions"){w.style.display="block";document.getElementById("home-waiting-text").textContent="Moderator sammelt die Dimensionen.";}

  `<button id="submit-btn" class="btn ${complete?"btn-primary":"btn-disabled"}" style="${complete?"background:"+color:""}" onclick="${complete?"submitForm('"+formType+"')":""}">${complete?btnLabel:"Bitte alle "+fields.length+" Felder ausfüllen"}</button>`;
}
function renderReadonly(fields,values,color){
  return`<div class="card">${fields.map(f=>`<div style="margin-bottom:10px"><div style="font-size:11px;color:${color};font-weight:500">${f.label}</div><div style="font-size:13px">${values[f.field]||"–"}</div></div>`).join("")}</div>`;

function renderRatingForm(p,d){
  const dims=state.dimensions;
  if(!dims.length)return`<div style="color:#aeaeb2;font-size:14px;padding:1rem">Noch keine Dimensionen definiert.</div>`;
  const complete=isRatingComplete(d);
  return`<p style="font-size:13px;color:#6e6e73;margin-bottom:1rem">1 = sehr schwach · 3 = ok · 5 = sehr stark</p>`+
    dims.map((dim,i)=>`<div style="margin-bottom:14px">

      </div>
      <div class="star-row" id="dim-row-${i}">${[1,2,3,4,5].map(n=>`<button class="star-btn${d.ratings?.[dim]===n?" active":""}" data-val="${n}" style="${d.ratings?.[dim]===n?"background:"+p.color+";border-color:"+p.color+";color:#fff":""}" onclick="rateItem(${i},${n})">${n}</button>`).join("")}</div>
    </div>`).join("")+
    `<button id="submit-btn" class="btn ${complete?"btn-primary":"btn-disabled"}" style="margin-top:1rem;${complete?"background:"+p.color:""}" onclick="${complete?"submitForm('rating')":""}">${complete?"Einreichen ✓":"Bitte alle "+dims.length+" Felder bewerten"}</button>`;

function updateField(formType,field,val){
  const d=state.participants[currentPid];if(!d)return;
  if(formType==="checkin")d.checkin[field]=val;
  else if(formType==="compass")d.compass[field]=val;
  fbSetParticipant(currentPid,d);
  updateSubmitButton(formType,d);
}
function updateSubmitButton(formType,d){
  const btn=document.getElementById("submit-btn");if(!btn)return;
  const complete=formType==="checkin"?isCheckinComplete(d):isCompassComplete(d);
  const p=WS.participants.find(x=>x.id===currentPid);
  btn.className="btn "+(complete?"btn-primary":"btn-disabled");
  btn.style.background=complete?p.color:"";
  btn.textContent=complete?(formType==="checkin"?"Check-in einreichen ✓":"Einreichen ✓"):"Bitte alle "+(formType==="checkin"?WS.checkinFields:WS.compassFields).length+" Felder ausfüllen";
  btn.onclick=complete?()=>submitForm(formType):null;
}
function rateItem(dimIndex,n){
  const d=state.participants[currentPid];if(!d)return;
  if(!d.ratings)d.ratings={};
  const dim=state.dimensions[dimIndex];
  if(!dim)return;
  d.ratings[dim]=n;
  fbSetParticipant(currentPid,d);
  const p=WS.participants.find(x=>x.id===currentPid);
  document.querySelectorAll(`#dim-row-${dimIndex} .star-btn`).forEach(btn=>{
    const v=parseInt(btn.dataset.val);
    btn.classList.toggle("active",v===n);
    btn.style.background=v===n?p.color:"";btn.style.borderColor=v===n?p.color:"";btn.style.color=v===n?"#fff":"";
  });
  const sc=document.getElementById("dim-score-"+dimIndex);
  if(sc){sc.style.color=p.color;sc.textContent=n;}
  const complete=isRatingComplete(d);
  const btn=document.getElementById("submit-btn");
  if(btn){btn.className="btn "+(complete?"btn-primary":"btn-disabled");btn.style.background=complete?p.color:"";btn.textContent=complete?"Einreichen ✓":"Bitte alle "+state.dimensions.length+" Felder bewerten";btn.onclick=complete?()=>submitForm("rating"):null;}
}
function submitForm(formType){
  const d=state.participants[currentPid];if(!d)return;
  if(formType==="checkin")d.submittedCheckin=true;
  else if(formType==="compass")d.submittedCompass=true;

  fbSetParticipant(currentPid,d);
  renderParticipant();
}

function drawFieberChart(){
  const canvas=document.getElementById("fieber-canvas");
  if(!canvas)return;
  const dpr=window.devicePixelRatio||1;
  const W=canvas.offsetWidth||600;
  const H=280;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+"px";canvas.style.height=H+"px";
  const ctx=canvas.getContext("2d");
  ctx.scale(dpr,dpr);
  const fever=state.fever||{};
  const pad={top:20,right:20,bottom:40,left:40};
  const cw=W-pad.left-pad.right;
  const ch=H-pad.top-pad.bottom;
  const n=MONTHS.length;
  // grid
  ctx.strokeStyle="#e5e5ea";ctx.lineWidth=0.5;
  [-3,-2,-1,0,1,2,3].forEach(v=>{
    const y=pad.top+ch*(1-(v+3)/6);
    ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(pad.left+cw,y);ctx.stroke();
    ctx.fillStyle=v===0?"#aeaeb2":"#d2d2d7";ctx.font="10px -apple-system,sans-serif";
    ctx.textAlign="right";ctx.fillText(v>0?"+"+v:v,pad.left-6,y+3);
  });
  // zero line bold
  const y0=pad.top+ch*(1-3/6);
  ctx.strokeStyle="#d2d2d7";ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(pad.left,y0);ctx.lineTo(pad.left+cw,y0);ctx.stroke();
  // x labels
  ctx.fillStyle="#aeaeb2";ctx.font="9px -apple-system,sans-serif";ctx.textAlign="center";
  MONTHS.forEach((m,i)=>{
    const x=pad.left+i*(cw/(n-1));
    ctx.fillText(m.label.split(" ")[0],x,H-pad.bottom+14);
  });
  // lines per participant
  WS.participants.forEach(p=>{
    const points=MONTHS.map((m,i)=>{
      const e=(fever[m.key]||{})[p.id];
      if(!e||e.score==null)return null;
      return{x:pad.left+i*(cw/(n-1)),y:pad.top+ch*(1-(e.score+3)/6)};
    });
    // draw line segments between non-null points
    ctx.strokeStyle=p.color;ctx.lineWidth=2;ctx.lineJoin="round";
    let drawing=false;
    points.forEach(pt=>{
      if(!pt){drawing=false;return;}
      if(!drawing){ctx.beginPath();ctx.moveTo(pt.x,pt.y);drawing=true;}
      else ctx.lineTo(pt.x,pt.y);
    });
    ctx.stroke();
    // dots
    points.forEach(pt=>{
      if(!pt)return;
      ctx.beginPath();ctx.arc(pt.x,pt.y,4,0,Math.PI*2);
      ctx.fillStyle=p.color;ctx.fill();
      ctx.strokeStyle="#fff";ctx.lineWidth=1.5;ctx.stroke();
    });
  });
  // legend
  let lx=pad.left;
  WS.participants.forEach(p=>{
    ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(lx+5,H-6,4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="#6e6e73";ctx.font="10px -apple-system,sans-serif";ctx.textAlign="left";
    ctx.fillText(p.name,lx+12,H-3);
    lx+=60;
  });
}

        <div style="font-size:12px;color:#6e6e73">Bewertung: <span style="color:${d.submittedRating?"#2EAE85":"#aeaeb2"}">${d.submittedRating?"✓":"offen"}</span></div>

function buildPresSlides(){
  const avg=getAvgRatings();
  const sorted=[...avg].sort((a,b)=>b.avg-a.avg);
  const hi3=sorted.slice(0,3),lo3=sorted.slice(-3).reverse();
  presSlides=[
    ()=>presTitle(),
    ()=>presFieber(),
    ...WS.participants.map(p=>()=>presCompass(p)),
    ()=>presCompassAll(),
    ...(state.dimensions.length?[()=>presDimensions()]:[]),
    ...(avg.some(r=>r.avg>0)?[()=>presRatings(avg),()=>presHiLo(hi3,lo3)]:[]),
    ...WS.noteBlocks.map(b=>()=>presNotes(b)),
    ()=>presSummary(hi3,lo3),
  ];
  presSlide=0;
}
function presNav(dir){presSlide=Math.max(0,Math.min(presSlides.length-1,presSlide+dir));renderPresSlide();}
document.addEventListener("keydown",e=>{
  if(currentScreen!=="s-pres")return;
  if(e.key==="ArrowRight"||e.key==="ArrowDown")presNav(1);
  if(e.key==="ArrowLeft"||e.key==="ArrowUp")presNav(-1);

});
function renderPresSlide(){
  document.getElementById("pres-slide").innerHTML=presSlides[presSlide]?presSlides[presSlide]():"";

  document.getElementById("pres-dots").innerHTML=presSlides.map((_,i)=>`<div class="pres-dot" onclick="presSlide=${i};renderPresSlide()" style="width:${i===presSlide?20:8}px;background:${i===presSlide?"#5B8AF5":"#333"}"></div>`).join("");
  document.getElementById("pres-prev").style.color=presSlide===0?"#444":"#fff";
  document.getElementById("pres-next").style.color=presSlide===presSlides.length-1?"#444":"#fff";

function drawPresChart(){
  const canvas=document.getElementById("pres-chart");
  if(!canvas)return;
  const dpr=window.devicePixelRatio||1;
  const W=canvas.offsetWidth||800;
  const H=300;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+"px";canvas.style.height=H+"px";
  const ctx=canvas.getContext("2d");
  ctx.scale(dpr,dpr);
  const fever=state.fever||{};
  const pad={top:20,right:20,bottom:50,left:45};
  const cw=W-pad.left-pad.right;
  const ch=H-pad.top-pad.bottom;
  const n=MONTHS.length;
  ctx.strokeStyle="#2a2d3a";ctx.lineWidth=0.5;
  [-3,-2,-1,0,1,2,3].forEach(v=>{
    const y=pad.top+ch*(1-(v+3)/6);
    ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(pad.left+cw,y);ctx.stroke();
    ctx.fillStyle=v===0?"#888":"#444";ctx.font="11px -apple-system,sans-serif";
    ctx.textAlign="right";ctx.fillText(v>0?"+"+v:v,pad.left-8,y+4);
  });
  const y0=pad.top+ch*0.5;
  ctx.strokeStyle="#444";ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(pad.left,y0);ctx.lineTo(pad.left+cw,y0);ctx.stroke();
  ctx.fillStyle="#555";ctx.font="10px -apple-system,sans-serif";ctx.textAlign="center";
  MONTHS.forEach((m,i)=>{
    const x=pad.left+i*(cw/(n-1));
    ctx.fillText(m.label.replace(" ","'\n"),x,H-pad.bottom+16);
  });
  WS.participants.forEach(p=>{
    const points=MONTHS.map((m,i)=>{const e=(fever[m.key]||{})[p.id];if(!e||e.score==null)return null;return{x:pad.left+i*(cw/(n-1)),y:pad.top+ch*(1-(e.score+3)/6)};});
    ctx.strokeStyle=p.color;ctx.lineWidth=2.5;ctx.lineJoin="round";
    let drawing=false;
    points.forEach(pt=>{if(!pt){drawing=false;return;}if(!drawing){ctx.beginPath();ctx.moveTo(pt.x,pt.y);drawing=true;}else ctx.lineTo(pt.x,pt.y);});
    ctx.stroke();
    points.forEach(pt=>{if(!pt)return;ctx.beginPath();ctx.arc(pt.x,pt.y,5,0,Math.PI*2);ctx.fillStyle=p.color;ctx.fill();ctx.strokeStyle="#0f1117";ctx.lineWidth=2;ctx.stroke();});
  });
  let lx=pad.left;
  WS.participants.forEach(p=>{ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(lx+6,H-12,5,0,Math.PI*2);ctx.fill();ctx.fillStyle="#aaa";ctx.font="11px -apple-system,sans-serif";ctx.textAlign="left";ctx.fillText(p.name,lx+15,H-8);lx+=80;});
}

function presSummary(hi3,lo3){return`<div><div style="font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:#5B8AF5;margin-bottom:1rem">Zusammenfassung</div><h2 style="font-size:26px;font-weight:500;margin:0 0 1.5rem;color:#fff">Key Takeaways</h2><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">${pc("#2EAE85","↑ Stark",hi3.map(({dim,avg})=>`<div style="font-size:13px;color:#2EAE85;margin-bottom:4px">↑ ${dim} · ${avg.toFixed(1)}</div>`).join(""))}${pc("#E24B4A","↓ Entwicklung",lo3.map(({dim,avg})=>`<div style="font-size:13px;color:#E24B4A;margin-bottom:4px">↓ ${dim} · ${avg.toFixed(1)}</div>`).join(""))}</div></div>`;}
</script>
